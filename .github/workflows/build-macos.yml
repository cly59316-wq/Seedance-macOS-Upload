name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install --upgrade setuptools wheel

      - name: Build macOS app
        run: |
          python3 -m PyInstaller \
            --name "Seedance" \
            --windowed \
            --onedir \
            --osx-bundle-identifier "cn.seedance.app" \
            --add-data "index.html:." \
            --add-data "favicon.png:." \
            --noconfirm \
            --clean \
            app.py

      - name: Verify build output
        run: |
          ls -la dist/
          ls -la "dist/Seedance.app/Contents/MacOS/" || true

      - name: Zip .app for distribution
        run: |
          cd dist
          zip -r "Seedance-macOS.zip" "Seedance.app"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Seedance-macOS
          path: dist/Seedance-macOS.zip

      - name: Create Release & Upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Seedance-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
